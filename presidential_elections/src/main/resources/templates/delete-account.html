<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account</title>
    <link rel="stylesheet" th:href="@{/delete-account.css}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/about">About</a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">User</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/user/profile">Profile</a></li>
                        <li><a class="dropdown-item" href="/user/update-profile">Update Profile</a></li>
                        <li><a class="dropdown-item" href="/user/delete-account">Delete Account</a></li>
                    </ul>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Candidacy</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/user/candidacy/candidate-application">Submit</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/update-candidacy">Update</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/withdraw-candidacy">Withdraw</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/candidates-list">List</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/user/logout">Sign Out</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<form action="/user/delete-account" method="post" class="container mt-5">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
    <h2 class="text-center mb-4 text-danger"><i class="fas fa-user-times"></i> Delete Your Account</h2>

    <p th:if="${error}" class="error-message text-center text-danger" th:text="${error}"></p>

    <div class="alert alert-warning text-center" role="alert">
        <i class="fas fa-exclamation-triangle"></i>
        Warning: Deleting your account is <strong>irreversible</strong>. All your data will be permanently removed.
    </div>

    <div class="form-floating mb-3">
        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username"
               required>
        <label for="username"><i class="fas fa-user"></i> Confirm your username</label>
    </div>

    <div class="text-center mt-4">
        <button type="submit" class="btn btn-danger px-5"><i class="fas fa-trash-alt"></i> Delete Account</button>
    </div>

    <div class="image-container text-center mt-4">
        <img src="/images/delete.gif" class="circle-image" alt="Delete Image"/>
    </div>
</form>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
