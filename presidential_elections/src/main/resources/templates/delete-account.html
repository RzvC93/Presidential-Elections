<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account</title>
    <link rel="stylesheet" href="delete.css">
</head>
<body>

<h1>Delete Your Account</h1>

<nav>
    <a href="/home">Home</a>
    <a href="/profile">Profile</a>
    <a href="/about">About</a>
    <a href="/update">Update</a>
    <a href="/candidate-application">Submit your candidacy</a>
    <a href="/candidates-list">Candidates List</a>
    <a href="/logout">Sign Out</a>
</nav>

<div class="delete-container">
    <form action="/delete-account" method="post">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">

        <p class="warning">Warning: Deleting your account is irreversible. All your data will be permanently removed.</p>
        <label for="username">Confirm your username:</label>
        <p th:if="${error}" class="error-message" th:text="${error}"></p>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
        <button type="submit" class="delete-button">Delete Account</button>
    </form>
</div>
</body>
</html>
