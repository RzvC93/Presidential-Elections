<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/login.css}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/home">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<form action="/user/login" method="post" class="container mt-5">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
    <h1 class="text-center mb-4 text-primary">
        <i class="fas fa-tachometer-alt"></i> Access Your Election Dashboard
    </h1>

    <p th:if="${error}" class="error-message text-center text-danger" th:text="${error}"></p>

    <div class="form-floating mb-3">
        <input type="text" name="username" class="form-control" id="username" placeholder="Username" required/>
        <label for="username"><i class="fas fa-user"></i> Username</label>
    </div>

    <div class="form-floating mb-3">
        <input type="password" name="password" class="form-control" id="password" placeholder="Password" required/>
        <label for="password"><i class="fas fa-lock"></i> Password</label>
    </div>

    <div class="text-center mt-4">
        <button type="submit" class="btn btn-primary px-5"><i class="fas fa-sign-in-alt"></i> Login</button>
    </div>

    <div class="image-container text-center mt-4">
        <img src="/images/login.gif" class="circle-image" alt="Login Image"/>
    </div>
</form>
<p class="text-center">Don't have an account? <a href="/user/signup">Sign up here</a></p>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
