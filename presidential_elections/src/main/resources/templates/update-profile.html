<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <link rel="stylesheet" th:href="@{/update-profile.css}">
</head>
<body>
<h1>Update Profile</h1>

<nav>
    <a href="/user/home">Home</a>
    <a href="/user/about">About</a>

    <div class="dropdown">
        <button class="dropbtn">User</button>
        <div class="dropdown-content">
            <a href="/user/profile">Profile</a>
            <a href="/user/update-profile">Update Profile</a>
            <a href="/user/delete-account">Delete Account</a>
        </div>
    </div>

    <div class="dropdown">
        <button class="dropbtn">Candidacy</button>
        <div class="dropdown-content">
            <a href="/user/candidacy/candidate-application">Submit your candidacy</a>
            <a href="/user/candidacy/update-candidacy">Update Candidacy</a>
            <a href="/user/candidacy/withdraw-candidacy">Withdraw Candidacy</a>
            <a href="/user/candidacy/candidates-list">Candidates List</a>
        </div>
    </div>

    <a href="/user/logout">Sign Out</a>
</nav>

<form action="/user/update-profile" method="post" th:object="${user}">
    <input type="hidden" name="_csrf" th:value="${_csrf.token}">

    <h2>Update your profile details</h2>
    <p th:if="${error}" class="error-message" th:text="${error}"></p>

    <div class="form-group">
        <div class="form-field">
            <label for="firstName">First Name</label>
            <input type="text" th:field="*{firstName}" id="firstName" placeholder="First Name" required/>
        </div>
        <div class="form-field">
            <label for="middleName">Middle Name</label>
            <input type="text" th:field="*{middleName}" id="middleName" placeholder="Middle Name"/>
        </div>
        <div class="form-field">
            <label for="lastName">Last Name</label>
            <input type="text" th:field="*{lastName}" id="lastName" placeholder="Last Name" required/>
        </div>
    </div>

    <div class="form-group">
        <div class="form-field">
            <label for="username">Username</label>
            <input type="text" th:field="*{username}" id="username" placeholder="Username" required/>
        </div>
        <div class="form-field">
            <label for="email">Email</label>
            <input type="email" th:field="*{email}" id="email" placeholder="Email" required/>
        </div>
        <div class="form-field">
            <label for="age">Age</label>
            <input type="number" th:field="*{age}" id="age" placeholder="Age" required/>
        </div>
    </div>

    <div class="form-group">
        <div class="form-field">
            <label for="gender">Gender</label>
            <select th:field="*{gender}" id="gender" required>
                <option value="" disabled>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-field">
            <label for="address">Address</label>
            <input type="text" th:field="*{address}" id="address" placeholder="Address" required/>
        </div>
        <div class="form-field">
            <label for="phoneNumber">Phone Number</label>
            <input type="text" th:field="*{phoneNumber}" id="phoneNumber" placeholder="Phone Number" required/>
        </div>
    </div>

    <h2>About Me</h2>
    <div class="form-group">
        <div class="form-field" style="width: 100%">
            <label for="aboutMe">Tell us about yourself</label>
            <textarea th:field="*{aboutMe}" id="aboutMe" placeholder="Tell us about yourself..."></textarea>
        </div>
    </div>

    <h2>Change Password (Optional)</h2>
    <div class="form-group">
        <div class="form-field">
            <label for="oldPassword">Current Password</label>
            <input type="password" name="oldPassword" id="oldPassword" placeholder="Current Password"/>
        </div>
        <div class="form-field">
            <label for="newPassword">New Password</label>
            <input type="password" name="newPassword" id="newPassword" placeholder="New Password"/>
        </div>
        <div class="form-field">
            <label for="confirmNewPassword">Confirm New Password</label>
            <input type="password" name="confirmNewPassword" id="confirmNewPassword"
                   placeholder="Confirm New Password"/>
        </div>
    </div>

    <button type="submit">Update</button>
</form>
</body>
</html>
