<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Candidacy</title>
    <link rel="stylesheet" href="/withdraw-candidacy.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/home">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user/about">About</a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">User</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/user/profile">Profile</a></li>
                        <li><a class="dropdown-item" href="/user/update-profile">Update Profile</a></li>
                        <li><a class="dropdown-item" href="/user/delete-account">Delete Account</a></li>
                    </ul>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Candidacy</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/user/candidacy/candidate-application">Submit</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/update-candidacy">Update</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/withdraw-candidacy">Withdraw</a></li>
                        <li><a class="dropdown-item" href="/user/candidacy/candidates-list">List</a></li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/user/logout">Sign Out</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1 class="text-center">Withdraw Your Candidacy</h1>
    <p class="text-center text-warning"><strong>This action cannot be undone. Please confirm.</strong></p>
    <p th:if="${error}" class="error-message text-center text-danger" th:text="${error}"></p>
    <p th:if="${success}" class="success-message text-center text-success" th:text="${success}"></p>

    <form action="/withdraw-candidacy" method="POST">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="confirmation" class="form-label">Type "CONFIRM" to withdraw your candidacy</label>
            <input type="text" class="form-control" id="confirmation" name="confirmation" placeholder="CONFIRM"
                   required>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-danger">Withdraw</button>
            <a href="/user/home" class="btn btn-secondary">Cancel</a>
        </div>
    </form>

    <div class="image-container text-center mt-4">
        <img src="/images/withdraw.gif" class="" alt="Withdraw Image"/>
    </div>
</div>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
